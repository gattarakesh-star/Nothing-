
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  text-align: center;
  color: white;
  overflow-x: hidden;
}

h1 {
  margin-top: 80px;
  font-size: 40px;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  background: #ff4081;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

#message {
  display: none;
  margin-top: 30px;
  font-size: 22px;
  animation: fadeIn 2s ease;
}

img {
  width: 220px;
  border-radius: 20px;
  margin-top: 20px;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* 🎈 Balloons */
.balloon {
  position: fixed;
  bottom: -100px;
  width: 40px;
  height: 60px;
  background: red;
  border-radius: 50%;
  animation: float 6s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday Laasya 🎉</h1>

<button onclick="start()">Click for Surprise 💖</button>

<div id="message">

  <p>I don't like saying bday wishes 
that's why I created this...
u made yesterday very special thnx for that❤️...
naa nunchi wishes expect chesuntey sry for late wishes🖤</p>

  <img src="photo.jpg">
</div>

<audio id="music" src="song.mp3" loop></audio>

<script>
function start() {
  document.getElementById("message").style.display = "block";

  let music = document.getElementById("music");
  music.play();

  createBalloons();
}

function createBalloons() {
  for (let i = 0; i < 10; i++) {
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random() * 100 + "vw";
    b.style.background = randomColor();
    b.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(b);
  }
}

function randomColor() {
  let colors = ["red","blue","green","yellow","purple","orange"];
  return colors[Math.floor(Math.random()*colors.length)];
}
</script>

</body>
</html>
